name: Build zxcmodule

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    strategy:
      matrix:
        include:
          - platform: x64
            solution_platform: x64
            output_name: gmcl_zxcmodule_win64.dll
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Build Solution
      run: |
        msbuild zxcmodule.sln /p:Configuration=Release /p:Platform="${{ matrix.solution_platform }}" /p:OutDir=.\build\${{ matrix.platform }}\ /v:minimal
    
    - name: Upload artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: zxcmodule-${{ matrix.platform }}
        path: build/${{ matrix.platform }}/${{ matrix.output_name }}
    
    - name: Upload to release
      if: github.event_name == 'release' && success()
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: build/${{ matrix.platform }}/${{ matrix.output_name }}
        asset_name: ${{ matrix.output_name }}
        asset_content_type: application/octet-stream

  build-debug:
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    
    strategy:
      matrix:
        platform: [x64]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Build Debug
      run: |
        msbuild zxcmodule.sln /p:Configuration=Debug /p:Platform="${{ matrix.platform }}" /p:OutDir=.\build\Debug\${{ matrix.platform }}\
    
    - name: Upload Debug artifacts
      uses: actions/upload-artifact@v4
      with:
        name: zxcmodule-debug-${{ matrix.platform }}
        path: build/Debug/${{ matrix.platform }}/gmcl_zxcmodule_win*.dll
