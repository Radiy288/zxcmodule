name: Diagnose Build

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Show solution platforms
      run: |
        echo "=== Solution platforms ==="
        findstr /C:"SolutionConfigurationPlatforms" -A 10 zxcmodule.sln
    
    - name: Test build x64
      run: |
        echo "Testing x64 build..."
        msbuild zxcmodule.sln /p:Configuration=Release /p:Platform=x64 /t:Clean
    
    - name: Test build x86
      run: |
        echo "Testing x86 build..."
        msbuild zxcmodule.sln /p:Configuration=Release /p:Platform=x86 /t:Clean
    
    - name: Test direct vcxproj x64
      run: |
        echo "Testing direct x64 build..."
        msbuild zxcmodule.vcxproj /p:Configuration=Release /p:Platform=x64 /t:Clean
    
    - name: Test direct vcxproj Win32
      run: |
        echo "Testing direct Win32 build..."
        msbuild zxcmodule.vcxproj /p:Configuration=Release /p:Platform=Win32 /t:Clean
